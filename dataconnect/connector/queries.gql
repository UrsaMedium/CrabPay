query GetAllProductsQuery @auth(level: PUBLIC) {
  products {
    id
    name
    description
    imageUrl
  }
}

query GetProductFieldsQuery($productId: UUID!) @auth(level: PUBLIC) {
  productFields(where: { productId: { eq: $productId } }) {
    productId
    id
    order
    fieldName
    handler
    attributes
    expectedData
  }
}

query GetPriceFunctionQuery($productId: UUID!) @auth(level: PUBLIC) {
  priceFunctions(where: { productId: { eq: $productId } }) {
    productId
    id
    name
    type
    formulas
    currency
  }
}

query GetAllCurrenciesQuery @auth(level: PUBLIC) {
  currenciess {
    id
    name
    mainCurrency
    rub
    usd
  }
}
