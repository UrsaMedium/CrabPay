query GetAllProductsQuery
@auth(
  level: USER_ANON
  insecureReason: "Available to anon users through the app"
) {
  products {
    id
    name
    description
    imageUrl
    currencies
  }
}

query GetProductFieldsQuery($productId: UUID!)
@auth(
  level: USER_ANON
  insecureReason: "Available to anon users through the app"
) {
  productFields(where: { productId: { eq: $productId } }) {
    productId
    id
    order
    fieldName
    isPriceImage
    handler
    priceImages
    expectedData
  }
}

query GetAllCurrenciesQuery
@auth(
  level: USER_ANON
  insecureReason: "Available to anon users through the app"
) {
  currenciess {
    id
    name
    mainCurrency
    rub
    usd
  }
}

query GetCartItemsQuery($userId: String!)
@auth(
  level: USER_ANON
  insecureReason: "Available to anon users through the app"
) {
  cartItems(where: { userId: { eq: $userId } }) {
    id
    userId
    userName
    productId
    productName
    purchaseData
    currency
    checkoutPrice
    createdAt
    status
    comment
    statusChangedAt
  }
}

query GetUserCartCount($userId: String!)
@auth(
  level: USER_ANON
  insecureReason: "Available to anon users through the app"
) {
  ofUserCartItemCounters(where: { userId: { eq: $userId } }) {
    userCartItemCount
  }
}

query GetProductCartCount($userId: String!, $productId: UUID!)
@auth(
  level: USER_ANON
  insecureReason: "Available to anon users through the app"
) {
  ofUserOfProductCartItemCounters(
    where: { userId: { eq: $userId }, productId: { eq: $productId } }
  ) {
    productCartItemCount
  }
}

query GetFeaturedProducts
@auth(
  level: USER_ANON
  insecureReason: "Available to anon users through the app"
) {
  featuredProducts {
    id
    featuredProductId
  }
}

query GetUserPreferences($userId: String!)
@auth(level: USER, insecureReason: "Available to authorized users") {
  userPreferences(where: { userId: { eq: $userId } }) {
    favoriteProductId
  }
}
