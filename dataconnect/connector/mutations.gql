mutation DeleteLastAddedProductCartItem($userId: String!, $productId: UUID!)
@auth(
  level: USER_ANON
  insecureReason: "Available to anon users through the app"
) {
  _execute(
    sql: """
    DELETE FROM cart_item
    WHERE id = (
      SELECT id
      FROM cart_item
      WHERE user_id = $1 AND product_id = $2
      ORDER BY created_at DESC
      LIMIT 1
    )
    """
    params: [$userId, $productId]
  )
}

mutation UpdateProductField(
  $id: UUID!,
  $productId: UUID,
  $order: Int,
  $fieldName: String,
  $isPriceImage: Boolean,
  $handler: String,
  $priceImages: Any,
  $expectedData: [String!]
) @auth(expr: "auth.token.admin == true", insecureReason: "Admin only") {
  productField_update(
    id: $id,
    data: {
      productId: $productId,
      order: $order,
      fieldName: $fieldName,
      isPriceImage: $isPriceImage,
      handler: $handler,
      priceImages: $priceImages,
      expectedData: $expectedData
    }
  )
}
