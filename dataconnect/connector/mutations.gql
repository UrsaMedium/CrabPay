mutation DeleteLastAddedProductCartItem($userId: String!, $productId: UUID!)
@auth(level: PUBLIC) {
  _execute(
    sql: """
    DELETE FROM cart_item
    WHERE id = (
      SELECT id
      FROM cart_item
      WHERE user_id = $1 AND product_id = $2
      ORDER BY created_at DESC
      LIMIT 1
    )
    """
    params: [$userId, $productId]
  )
}
