mutation deleteCartItem($id: UUID!)
@auth(
  level: USER_ANON
  insecureReason: "Available to anon users through the app"
) {
  cartItem_delete(key: { id: $id })
}

mutation addCartItem(
  $id: UUID
  $userId: String!
  $userName: String!
  $productId: UUID!
  $productName: String!
  $purchaseData: Any!
  $currency: String!
  $checkoutPrice: Float!
  $status: String!
  $comment: String
)
@auth(
  level: USER_ANON
  insecureReason: "Available to anon users through the app"
) {
  cartItem_insert(
    data: {
      id: $id
      userId: $userId
      userName: $userName
      productId: $productId
      productName: $productName
      purchaseData: $purchaseData
      currency: $currency
      checkoutPrice: $checkoutPrice
      status: $status
      comment: $comment
    }
  )
}

mutation addFeaturedProduct($id: UUID, $featuredProductId: UUID!)
@auth(expr: "auth.token.admin == true", insecureReason: "Admin only") {
  featuredProduct_insert(
    data: { id: $id, featuredProductId: $featuredProductId }
  )
}

mutation DeleteFeaturedProduct($featuredProductId: UUID!)
@auth(expr: "auth.token.admin == true", insecureReason: "Admin only") {
  featuredProduct_deleteMany(
    where: { featuredProductId: { eq: $featuredProductId } }
  )
}

mutation addUserPreference(
  $id: UUID
  $userId: String!
  $favoriteProductId: UUID!
) @auth(level: USER, insecureReason: "Available to authorized users") {
  userPreference_insert(
    data: { id: $id, userId: $userId, favoriteProductId: $favoriteProductId }
  )
}

mutation DeleteUserPreference($userId: String!, $favoriteProductId: UUID!)
@auth(level: USER, insecureReason: "Available to authorized users") {
  userPreference_delete(
    first: {
      where: {
        _and: [
          { userId: { eq: $userId } }
          { favoriteProductId: { eq: $favoriteProductId } }
        ]
      }
    }
  )
}

mutation UpdateCartItem(
  $id: UUID!
  $userId: String
  $userName: String
  # $productId: UUID,
  # $productName: String,
  # $purchaseData: Any,
  # $currency: String,
  # $checkoutPrice: Float,
  $status: String
  $comment: String
