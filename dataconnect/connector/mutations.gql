mutation AddProduct(
  $id: UUID
  $description: String!
  $imageUrl: String!
  $name: String!
  $currencies: String!
) @auth(expr: "auth.token.admin == true", insecureReason: "Admin only") {
  product_insert(
    data: {
      id: $id
      description: $description
      imageUrl: $imageUrl
      name: $name
      currencies: $currencies
    }
  )
}

mutation DeleteProduct($id: UUID!)
@auth(expr: "auth.token.admin == true", insecureReason: "Admin only") {
  product_delete(key: { id: $id })
}

mutation UpdateProduct(
  $id: UUID!
  $name: String
  $description: String
  $imageUrl: String
  $currencies: String
) @auth(expr: "auth.token.admin == true", insecureReason: "Admin only") {
  product_update(
    key: { id: $id }
    data: {
      name: $name
      description: $description
      imageUrl: $imageUrl
      currencies: $currencies
    }
  )
}

mutation AddProductField(
  $productId: UUID!
  $order: Int!
  $priceImages: Any
  $expectedData: [String!]
  $handler: String!
  $fieldName: String!
  $isPriceImage: Boolean!
) @auth(expr: "auth.token.admin == true", insecureReason: "Admin only") {
  productField_insert(
    data: {
      productId: $productId
      order: $order
      priceImages: $priceImages
      expectedData: $expectedData
      handler: $handler
      fieldName: $fieldName
      isPriceImage: $isPriceImage
    }
  )
}

mutation DeleteProductField($id: UUID!)
@auth(expr: "auth.token.admin == true", insecureReason: "Admin only") {
  productField_delete(key: { id: $id })
}

