mutation AddProduct(
  $description: String!
  $imageUrl: String!
  $name: String!
  $price: Float!
) @auth(level: PUBLIC) {
  product_insert(
    data: {
      description: $description
      imageUrl: $imageUrl
      name: $name
      price: $price
    }
  )
}

mutation AddProductProperty(
  $productId: UUID!
  $order: Int!
  $attributes: Any!
  $dataHandler: Any!
  $handler: String!
  $propertyName: String!
) @auth(level: PUBLIC) {
  productProperty_insert(
    data: {
      productId: $productId
      order: $order
      attributes: $attributes
      dataHandler: $dataHandler
      handler: $handler
      propertyName: $propertyName
    }
  )
}
