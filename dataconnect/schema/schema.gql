type Product @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  description: String!
  imageUrl: String!
  currencies: String!
}

type ProductField @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  product: Product!
  order: Int!
  fieldName: String!
  isPriceImage: Boolean! @default(value: false)
  handler: String!
  priceImages: Any
  expectedData: [String!]
}

type Currencies @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  mainCurrency: String!
  rub: Float!
  usd: Float!
}

type CartProduct @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  userId: String!
  userName: String!
  productId: UUID!
  productName: String!
  purchaseData: Any!
  currency: UUID!
  checkoutPrice: Float!
  createdAt: Timestamp! @default(expr: "request.time")
  status: String!
  comment: String
  statusChangedAt: Timestamp! @default(expr: "request.time")
}
