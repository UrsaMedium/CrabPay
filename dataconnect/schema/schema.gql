type Product @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  description: String!
  price: Float!
  imageUrl: String
}

type ProductProperties @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  product: Product!
  propertyName: String!
  handler: String!
  attributes: Any
  dataHandler: Any
}