type Product @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  description: String!
  imageUrl: String!
}

type ProductField @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  product: Product!
  order: Int!
  fieldName: String!
  handler: String!
  attributes: Any
  expectedData: [String!]
}

type PriceFunction @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  product: Product!
  functionImageField: String! @default(value: "Field Name")
  type: String!
  formulas: Any!
  currency: String!
}

type Currencies @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  mainCurrency: String!
  rub: Float!
  usd: Float!
}
