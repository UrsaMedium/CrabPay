type Product @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  description: String!
  price: Float!
  imageUrl: String!
}

type ProductField @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  product: Product!
  order: Int!
  fieldName: String!
  handler: String!
  attributes: Any
  expectedData: [String!]
}
